# AndroidX — obligatorio para Compose y todas las dependencias modernas
android.useAndroidX=true

# Suprimir warning de compileSdk 35 con AGP 8.5.2
android.suppressUnsupportedCompileSdk=35

# Kotlin code style
kotlin.code.style=official

# Habilitar el nuevo compilador de Compose (R8/D8 para Kotlin 2.x)
kotlin.incremental=true

# Memoria para el daemon de Gradle (útil en proyectos con NDK)
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Builds en paralelo
org.gradle.parallel=true
org.gradle.caching=true
